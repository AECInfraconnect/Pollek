[package]
name = "dek-policy-presets"
version = {workspace = true}
edition = {workspace = true}
license = {workspace = true}
description = "Policy presets for Pollek DEK (Rego, Cedar, OpenFGA)"
repository = {workspace = true}
rust-version = {workspace = true}
authors = {workspace = true}

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = "0.8"
anyhow = "1.0"
uuid = { version = "1.23.3", features = ["v4"] }
dek-domain-schema = { version = "0.1.0", path = "../dek-domain-schema" }
dek-control-plane-api = { version = "0.1.0", path = "../dek-control-plane-api" }
dek-guard-pipeline = { path = "../dek-guard-pipeline" }

[lints]
workspace = true

[dev-dependencies]
cedar-policy = "4.1"
