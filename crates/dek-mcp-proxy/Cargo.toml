[package]
name = "dek-mcp-proxy"
version = "0.1.0"
edition = "2021"

[dependencies]
dek-policy-runtime = { path = "../dek-policy-runtime" }
dek-policy-router = { path = "../dek-policy-router" }
dek-policy-syncer = { path = "../dek-policy-syncer" }
dek-domain-schema = { path = "../dek-domain-schema" }
dek-telemetry = { path = "../dek-telemetry" }
metrics = "0.22"
dek-cedar = { path = "../dek-cedar" }
dek-openfga = { path = "../dek-openfga" }
dek-mcp-normalizer = { path = "../dek-mcp-normalizer" }
dek-wasm-host = { path = "../dek-wasm-host" }
dek-activation = { path = "../dek-activation" }
dek-decision = { path = "../dek-decision" }
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["rt"] }
anyhow.workspace = true
axum = "0.7"
tracing.workspace = true
tracing-subscriber.workspace = true
dek-auth = { path = "../dek-auth" }
arc-swap = "1.6"
async-trait = "0.1.89"
dek-config = { version = "0.1.0", path = "../dek-config" }
notify = "8.2.0"
base64 = "0.22"
uuid = { version = "1.8", features = ["v4"] }
chrono = "0.4"


metrics-exporter-prometheus = "0.13"

dek-router-builder = { path = "../dek-router-builder" }
jsonwebtoken = "9.3.1"
hyper = "1.0"
hyper-util = { version = "0.1", features = ["tokio"] }

[lints]
workspace = true
