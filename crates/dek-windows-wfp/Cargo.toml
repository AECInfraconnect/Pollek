[package]
license = "Apache-2.0"

name = "dek-windows-wfp"
version = "0.1.0"
edition = "2021"

authors = ["Pollek Cloud Team <team@pollek.cloud>"]
description = "Windows Filtering Platform (WFP) adapter for Pollek DEK network guardrails"

[dependencies]
dek-domain-schema = { path = "../dek-domain-schema" }
dek-enforcement-api = { path = "../dek-enforcement-api" }
dek-telemetry = { path = "../dek-telemetry" }
anyhow = { workspace = true }
tracing = { workspace = true }
async-trait = "0.1"
serde.workspace = true
serde_json.workspace = true
chrono = { workspace = true }
dek-secure-spool = { version = "0.1.0", path = "../dek-secure-spool" }
tokio = { workspace = true, features = ["rt"] }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58.0", features = [
    "Win32_Foundation",
    "Win32_NetworkManagement_WindowsFilteringPlatform",
    "Win32_Security",
    "Win32_System_Threading",
    "Win32_System_Rpc",
    "Win32_Networking_WinSock",
] }


[lints]
workspace = true
