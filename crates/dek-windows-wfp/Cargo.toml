[package]
license = "Apache-2.0"

name = "dek-windows-wfp"
version = "0.1.0"
edition = "2021"

authors = ["Pollen Cloud Team <team@pollen.cloud>"]
description = "Windows Filtering Platform (WFP) adapter for Pollen DEK network guardrails"

[dependencies]
dek-domain-schema = { path = "../dek-domain-schema" }
dek-enforcement-api = { path = "../dek-enforcement-api" }
anyhow = { workspace = true }
tracing = { workspace = true }
async-trait = "0.1"
serde.workspace = true
serde_json.workspace = true

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58.0", features = [
    "Win32_Foundation",
    "Win32_NetworkManagement_WindowsFilteringPlatform",
    "Win32_Security",
    "Win32_System_Threading",
    "Win32_System_Rpc",
    "Win32_Networking_WinSock",
] }

