[package]
license = "Apache-2.0"
name = "local-control-plane"
version = "0.1.0"
edition = "2021"

[dependencies]
dek-control-plane-api = { path = "../dek-control-plane-api" }
tokio = { version = "1.0", features = ["full"] }
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls"] }
async-trait = "0.1"
anyhow = "1.0"
chrono = "0.4"
tower-http = { version = "0.5", features = ["trace", "cors", "fs"] }
tracing = "0.1"
tracing-subscriber = "0.3"
ed25519-dalek = "2"
getrandom = "0.2"
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
futures-util = "0.3.32"
tokio-stream = { version = "0.1.18", features = ["sync"] }
async-stream = "0.3.6"
rand = "0.8.5"
thiserror.workspace = true
dek-policy-intent = { version = "1.0.0-beta.1", path = "../dek-policy-intent" }
dek-bundle-format = { version = "1.0.0-beta.1", path = "../dek-bundle-format" }
dek-policy-compiler = { version = "1.0.0-beta.1", path = "../dek-policy-compiler" }
pollen-contract = { path = "../../contracts/generated/rust/pollen-contract" }
dek-policy-router = { path = "../dek-policy-router" }
dek-plugin-sdk = { path = "../dek-plugin-sdk" }
dek-cedar = { path = "../dek-cedar" }
dek-policy-runtime = { path = "../dek-policy-runtime" }
reqwest = { workspace = true, features = ["json"] }
dek-config = { version = "0.1.0", path = "../dek-config" }
dek-agent-discovery = { path = "../dek-agent-discovery" }
dek-policy-suggester = { path = "../dek-policy-suggester" }
dek-agent-observer = { path = "../dek-agent-observer" }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tempfile = "3.27.0"

[lints]
workspace = true
