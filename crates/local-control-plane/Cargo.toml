[package]
license = "Apache-2.0"
name = "local-control-plane"
version = "0.1.0"
edition = "2021"
# The package ships two binaries (the server `local-control-plane` and the
# on-demand `cloud_sync_once` sync client); pin the default so bare
# `cargo run -p local-control-plane` still starts the server.
default-run = "local-control-plane"

[dependencies]
dek-control-plane-api = { version = "0.1.0", path = "../dek-control-plane-api" }
tokio = { version = "1.0", features = ["rt-multi-thread", "macros", "sync", "time", "net", "signal"] }
jsonschema = "0.46.5"
schemars = "0.8"
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rusqlite = { version = "0.32", features = ["bundled"] }
async-trait = "0.1"
anyhow = "1.0"
chrono = "0.4"
tower-http = { version = "0.5", features = ["trace", "cors", "fs"] }
tracing = "0.1"
tracing-subscriber = "0.3"
ed25519-dalek = "2"
getrandom = "0.2"
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
futures-util = "0.3.32"
rustls.workspace = true
tokio-stream = { version = "0.1.18", features = ["sync"] }
async-stream = "0.3.6"
rand = "0.8.5"
thiserror.workspace = true
dek-policy-intent = { version = "1.0.0-beta.1", path = "../dek-policy-intent" }
dek-bundle-format = { version = "1.0.0-beta.1", path = "../dek-bundle-format" }
dek-capability-registry = { path = "../dek-capability-registry" }
dek-policy-compiler = { version = "1.0.0-beta.1", path = "../dek-policy-compiler" }
pollek-contract = { version = "0.1.0", path = "../../contracts/generated/rust/pollek-contract" }
dek-policy-router = { version = "0.1.0", path = "../dek-policy-router" }
dek-plugin-sdk = { version = "1.0.0-beta.10", path = "../dek-plugin-sdk" }
dek-wasm-host = { path = "../dek-wasm-host" }
dek-fingerprint-defs = { path = "../dek-fingerprint-defs" }
dek-cedar = { version = "0.1.0", path = "../dek-cedar" }
dek-policy-runtime = { version = "0.1.0", path = "../dek-policy-runtime" }
reqwest = { workspace = true, features = ["json"] }
dek-config = { version = "0.1.0", path = "../dek-config" }
dek-agent-discovery = { version = "1.0.0-beta.10", path = "../dek-agent-discovery" }
dek-policy-suggester = { version = "1.0.0-beta.7", path = "../dek-policy-suggester" }
dek-agent-observer = { version = "1.0.0-beta.7", path = "../dek-agent-observer" }
dek-detection = { path = "../dek-detection" }
dek-capability = { path = "../dek-capability" }
dek-recommend = { version = "1.0.0-beta.10", path = "../dek-recommend" }
uuid = { version = "1", features = ["v4"] }
dek-policy-presets = { version = "1.0.0-beta.7", path = "../dek-policy-presets" }
windows-dpapi = "0.2.0"
dek-domain-schema = { version = "0.1.0", path = "../dek-domain-schema" }
dek-telemetry = { version = "0.1.0", path = "../dek-telemetry" }
dek-errors = { version = "0.1.0", path = "../dek-errors" }
dek-metrics = { path = "../dek-metrics" }
metrics-exporter-prometheus = "0.13"
dek-agent-binding = { version = "1.0.0-beta.10", path = "../dek-agent-binding" }
serde_jcs = "0.2.0"
dek-deployment-planner = { version = "1.0.0-beta.10", path = "../dek-deployment-planner" }
dek-enforcement-api = { path = "../dek-enforcement-api" }
dek-secure-spool = { path = "../dek-secure-spool" }
content-guard = { path = "../../plugins/content-guard" }
[dev-dependencies]
tempfile = "3.27.0"

[lints]
workspace = true
