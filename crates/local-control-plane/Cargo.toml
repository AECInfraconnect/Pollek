[package]
name = "local-control-plane"
version = "0.1.0"
edition = "2021"

[dependencies]
dek-control-plane-api = { path = "../dek-control-plane-api" }
tokio = { version = "1.0", features = ["full"] }
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls"] }
async-trait = "0.1"
anyhow = "1.0"
chrono = "0.4"
tower-http = { version = "0.5", features = ["trace", "cors", "fs"] }
tracing = "0.1"
tracing-subscriber = "0.3"
ed25519-dalek = "2"
getrandom = "0.2"
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
futures-util = "0.3.32"
tokio-stream = { version = "0.1.18", features = ["sync"] }
async-stream = "0.3.6"
rand = "0.8.5"
thiserror = "2.0.18"

[dev-dependencies]
reqwest = { workspace = true, features = ["json"] }
