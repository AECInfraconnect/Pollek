[package]
license = "Apache-2.0"

name = "dek-telemetry"
version = "0.1.0"
edition = "2021"


[dependencies]
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
anyhow.workspace = true
reqwest.workspace = true
dek-config = { path = "../dek-config" }
dek-errors = { path = "../dek-errors" }
dek-secure-spool = { path = "../dek-secure-spool" }
tracing.workspace = true

tokio-retry = "0.3"
opentelemetry = { version = "0.26", features = ["metrics"] }
opentelemetry_sdk = { version = "0.26", features = ["metrics", "rt-tokio"] }
opentelemetry-otlp = { version = "0.26", features = ["http-proto", "reqwest-client", "metrics"] }
rusqlite = { version = "0.32", features = ["bundled"] }
regex = "1.11"
chrono = "0.4"
metrics = "0.22"
uuid = { version = "1", features = ["v4"] }

aes-gcm = "0.10"
rand = "0.8"
keyring = "2"
hex = "0.4"
pollen-contract = { path = "../../contracts/generated/rust/pollen-contract" }

[lints]
workspace = true
