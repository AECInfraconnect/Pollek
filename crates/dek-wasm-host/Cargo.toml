[package]
license = {workspace = true}
name = "dek-wasm-host"
version = "0.1.0"
edition = {workspace = true}
repository = {workspace = true}
rust-version = {workspace = true}
authors = {workspace = true}

[dependencies]
anyhow = "1"
bytes = "1"
dashmap = "6"
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
tokio = { version = "1", features = ["rt", "macros", "sync", "time"] }
tracing = "0.1"
wasmtime = { version = "46", features = ["async", "pooling-allocator", "cache"] }

[lints]
workspace = true
