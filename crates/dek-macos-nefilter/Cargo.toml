[package]
license = "Apache-2.0"

name = "dek-macos-nefilter"
version = "0.1.0"
edition = "2021"

authors = ["Pollek Cloud Team <team@pollek.cloud>"]
description = "macOS Network Extension (NEFilter) IPC adapter for Pollek DEK"

[dependencies]
dek-domain-schema = { path = "../dek-domain-schema" }
dek-enforcement-api = { path = "../dek-enforcement-api" }
anyhow = { workspace = true }
tracing = { workspace = true }
async-trait = "0.1"
serde.workspace = true
serde_json.workspace = true
dek-secure-spool = { version = "0.1.0", path = "../dek-secure-spool" }

[target.'cfg(target_os = "macos")'.dependencies]
