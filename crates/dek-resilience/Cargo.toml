[package]
license = {workspace = true}
name = "dek-resilience"
version = "0.1.0"
edition = {workspace = true}

# SaaS-scale primitives shared by the PEP processes (proxy, ext-authz):
#  - CircuitBreaker: wrap a PDP/evaluator; open on repeated failure -> fail-closed
#    fast instead of hammering a sick backend.
#  - AdmissionControl: global + per-tenant concurrency limits; over limit ->
#    reject (caller denies) so one tenant can't starve others or blow memory.
# Both are fail-closed by design.
repository = {workspace = true}
rust-version = {workspace = true}
authors = {workspace = true}

[dependencies]
tokio = { version = "1", features = ["sync", "time", "rt", "macros"] }
metrics = "0.24"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "sync", "time", "test-util"] }

[lints]
workspace = true
