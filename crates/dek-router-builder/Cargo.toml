[package]
license = {workspace = true}

name = "dek-router-builder"
version = "0.1.0"
edition = {workspace = true}
repository = {workspace = true}
rust-version = {workspace = true}
authors = {workspace = true}


[dependencies]
dek-policy-router = { path = "../dek-policy-router" }
dek-cedar = { path = "../dek-cedar", optional = true }
dek-openfga = { path = "../dek-openfga", optional = true }
dek-opa-wasm = { path = "../dek-opa-wasm", optional = true }
dek-policy-runtime = { path = "../dek-policy-runtime" }
dek-plugin-host = { path = "../dek-plugin-host" }
dek-pdp-sdk = { path = "../dek-pdp-sdk" }
dek-config = { path = "../dek-config" }
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

[features]
default = ["adapter-cedar", "adapter-opa", "adapter-openfga"]
adapter-cedar = ["dep:dek-cedar"]
adapter-opa = ["dep:dek-opa-wasm"]
adapter-openfga = ["dep:dek-openfga"]

[lints]
workspace = true
