[package]
license = "Apache-2.0"

name = "dek-policy-syncer"
version = "0.1.0"
edition = "2021"


# Orchestrates the policy sync lifecycle (pull+verify+activate) and owns the
# fail-safe EnforcementState (freshness gate). Reuses dek-bundle-sync for
# fetch/verify and dek-activation for activation; does NOT re-implement them.

[dependencies]
dek-bundle-sync = { path = "../dek-bundle-sync" }
dek-bundle-format = { path = "../dek-bundle-format" }
dek-config = { path = "../dek-config" }
dek-telemetry = { path = "../dek-telemetry" }
dek-domain-schema = { path = "../dek-domain-schema" }
arc-swap = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "time", "macros", "sync"] }
tokio-util = "0.7"
anyhow = "1"
tracing = "0.1"
metrics = "0.22"
sha2 = "0.10"
hex = "0.4"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
thiserror = "2.0.18"

[dev-dependencies]
tempfile = "3"
axum = "0.7"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
base64 = "0.22"
tokio = { version = "1", features = ["full", "test-util"] }

