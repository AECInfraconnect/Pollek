[package]
license = "Apache-2.0"

name = "mock-cloud"
version = "0.1.0"
edition = "2021"


[dependencies]
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
anyhow.workspace = true
reqwest.workspace = true
axum = "0.7"
axum-server = { version = "0.7.1", features = ["tls-rustls"] }
base64 = "0.22.1"
rcgen = { version = "0.13", features = ["x509-parser", "pem"] }
rustls = { version = "0.23", features = ["ring"] }
rustls-pemfile = "2.1.0"
rustls-pki-types = "1.0"
tracing.workspace = true
tracing-subscriber.workspace = true
ed25519-dalek = { version = "2.0", features = ["rand_core"] }
rand = "0.10.1"
rand_core = { version = "0.6", features = ["std", "getrandom"] }
jsonwebtoken = "10.4.0"
rsa = { version = "0.9.10", features = ["pem"] }
serde_jcs = "0.2.0"
chrono = "0.4.45"
askama = "0.16.0"
dek-domain-schema = { version = "0.1.0", path = "../dek-domain-schema" }
dek-plugin-sdk = { version = "1.0.0-beta.1", path = "../dek-plugin-sdk" }
clap = { version = "4.5.31", features = ["derive"] }
futures-util = "0.3"
sha2 = "0.10"
hex = "0.4"
tower-http = { version = "0.5", features = ["fs", "cors"] }
dek-policy-intent = { version = "1.0.0-beta.1", path = "../dek-policy-intent" }
pollen-contract = { path = "../../contracts/generated/rust/pollen-contract" }

[lints]
workspace = true

[dev-dependencies]
jsonschema.workspace = true
tower = { version = "0.4", features = ["util"] }
