[package]
name = "dek-trust-gate"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Single Trust Policy Gate: the one activation choke point every Pollek bundle-manifest.v2 must pass (signature + signer-allowlist + revocation + generation-monotonicity + tenant/target match + artifact integrity, and optional provenance/SBOM/attestation)."

[lints]
workspace = true

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sha2 = "0.10"
hex = "0.4"
ed25519-dalek = "3.0"
base64 = "0.22.1"
