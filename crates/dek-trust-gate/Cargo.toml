[package]
name = "dek-trust-gate"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Single Trust Policy Gate: the one activation choke point every Pollek bundle must pass (signature + provenance + SBOM + test-attestation + signer-allowlist + revocation + generation-monotonicity + tenant/target match)."

[lints]
workspace = true

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_jcs = "0.2.0"
sha2 = "0.10"
hex = "0.4"
dek-bundle-format = { path = "../dek-bundle-format" }
dek-bundle-sync = { path = "../dek-bundle-sync" }

[dev-dependencies]
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
base64 = "0.22.1"
