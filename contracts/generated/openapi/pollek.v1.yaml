openapi: 3.1.0
info:
  title: Pollek DEK Control-Plane API
  version: 1.0.0
  contact:
    name: Pollek Platform Team
    url: https://your-cloud-domain.com
    email: platform@your-cloud-domain.com
  description: Contract between Pollek Cloud / Local Control Plane and the DEK edge enforcement plane.
tags:
  - name: Discovery
  - name: Bundles
  - name: Telemetry
  - name: Registry
  - name: Observation
  - name: PolicySuggestions
  - name: PolicyPresets
  - name: PepCapabilities
  - name: AI Usage
  - name: A2A Mediator
  - name: PDPConfig
  - name: LocalDashboard
paths:
  /.well-known/pollek-contract:
    get:
      operationId: ContractDiscoveryApi_getDiscovery
      description: Discover contract capabilities and supported protocol versions.
      parameters:
        - $ref: '#/components/parameters/PollekHeaders.contractVersion'
        - $ref: '#/components/parameters/PollekHeaders.deviceId'
        - $ref: '#/components/parameters/PollekHeaders.tenantId'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractDiscoveryResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollekError'
      tags:
        - Discovery
  /v1/a2a/message:
    post:
      operationId: A2AApi_sendMessage
      description: Send an Inter-Agent Trust Protocol (IATP) message via the DEK mediator.
      parameters:
        - $ref: '#/components/parameters/PollekHeaders.contractVersion'
        - $ref: '#/components/parameters/PollekHeaders.deviceId'
        - $ref: '#/components/parameters/PollekHeaders.tenantId'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/A2AMessageResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollekError'
      tags:
        - A2A Mediator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/A2AMessage'
  /v1/telemetry/batches:
