components:
  parameters:
    PollenHeaders.contractVersion:
      name: X-Pollen-Contract-Version
      in: header
      required: true
      schema:
        type: string
    PollenHeaders.deviceId:
      name: X-Pollen-Device-Id
      in: header
      required: false
      schema:
        type: string
    PollenHeaders.tenantId:
      name: X-Pollen-Tenant-Id
      in: header
      required: false
      schema:
        type: string
  schemas:
    BundleFetchRequest:
      type: object
      required:
        - tenant_id
        - device_id
        - capabilities
      properties:
        tenant_id:
          type: string
        device_id:
          type: string
        current_generation:
          type: integer
          format: int32
        capabilities:
          type: array
          items:
            type: string
    BundleFetchResponse:
      type: object
      required:
        - schema_version
        - status
      properties:
        schema_version:
          type: string
          enum:
            - bundle-fetch-response.v1
        status:
          type: string
          enum:
            - not_modified
            - bundle_ready
        generation:
          type: integer
          format: int32
        envelope: {}
    ContractDiscoveryResponse:
      type: object
      required:
        - schema_version
        - supported
        - preferred
        - capabilities
      properties:
        schema_version:
          type: string
          enum:
            - contract-discovery.v1
        supported:
          type: array
          items:
            type: string
        preferred:
          type: string
        minimum_dek_version:
          type: string
        sunset:
          type: object
          unevaluatedProperties:
            type: string
        capabilities:
          type: array
          items:
            type: string
    MissingControl:
      type: object
      required:
        - control_type
        - reason
        - recommended_policy_type
        - recommended_pep_type
      properties:
        control_type:
          type: string
        reason:
          type: string
        recommended_policy_type:
          type: string
        recommended_pep_type:
          type: string
    ObjectMeta:
      type: object
      required:
        - schema_version
        - tenant_id
        - workspace_id
        - environment_id
        - created_at
        - updated_at
        - created_by
        - updated_by
        - source
        - status
        - tags
      properties:
        schema_version:
          type: string
        tenant_id:
          type: string
        workspace_id:
          type: string
        environment_id:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        created_by:
          type: string
        updated_by:
          type: string
        source:
          type: string
        status:
          type: string
        tags:
          type: array
          items:
            type: string
    PepBinding:
      type: object
      required:
        - pep_type
        - deployment_status
        - rule_ids
        - capabilities
        - limitations
      properties:
        pep_type:
          type: string
        deployment_status:
          type: string
        rule_ids:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
        limitations:
          type: array
          items:
            type: string
    PolicyCoverageSummary:
      type: object
      required:
        - status
        - policy_ids
        - missing_controls
        - confidence
      properties:
        status:
          type: string
        policy_ids:
          type: array
          items:
            type: string
        missing_controls:
          type: array
          items:
            $ref: '#/components/schemas/MissingControl'
        last_simulated_at:
          type: string
        last_enforced_at:
          type: string
        confidence:
          type: number
          format: float
    PollenError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
    Resource:
      type: object
      required:
        - meta
        - resource_id
        - resource_type
        - name
        - uri
        - classification
        - attributes
        - data_boundary
        - data_tags
        - pii_types
        - secret_types
        - allowed_actions
        - observed_actions
        - observed_by_agent_ids
        - reachable_via_tool_ids
        - policy_coverage
        - pep_bindings
        - access_count_24h
        - violation_count_24h
        - cost_relevant
      properties:
        meta:
          $ref: '#/components/schemas/ObjectMeta'
        resource_id:
          type: string
        resource_type:
          type: string
        name:
          type: string
        uri:
          type: string
        classification:
          type: string
        owner_entity_id:
          type: string
        attributes:
          type: object
          unevaluatedProperties: {}
        data_boundary:
          type: string
        data_tags:
          type: array
          items:
            type: string
        pii_types:
          type: array
          items:
            type: string
        secret_types:
          type: array
          items:
            type: string
        allowed_actions:
          type: array
          items:
            type: string
        observed_actions:
          type: array
          items:
            type: string
        observed_by_agent_ids:
          type: array
          items:
            type: string
        reachable_via_tool_ids:
          type: array
          items:
            type: string
        policy_coverage:
          $ref: '#/components/schemas/PolicyCoverageSummary'
        pep_bindings:
          type: array
          items:
            $ref: '#/components/schemas/PepBinding'
        first_seen_at:
          type: string
        last_seen_at:
          type: string
        access_count_24h:
          type: integer
          format: int64
        violation_count_24h:
          type: integer
          format: int64
        cost_relevant:
          type: boolean
    ResourceListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
    SchemaFingerprint:
      type: object
      required:
        - input_schema_hash
        - drift_status
      properties:
        input_schema_hash:
          type: string
        output_schema_hash:
          type: string
        descriptor_hash:
          type: string
        previous_descriptor_hash:
          type: string
        drift_status:
          type: string
    TelemetryBatchRequest:
      type: object
      required:
        - schema_version
        - tenant_id
        - device_id
        - batch_id
        - events
      properties:
        schema_version:
          type: string
          enum:
            - telemetry-batch.v1
        tenant_id:
          type: string
        device_id:
          type: string
        batch_id:
          type: string
        events:
          type: array
          items: {}
    TelemetryIngestResponse:
      type: object
      required:
        - schema_version
        - accepted
        - rejected
      properties:
        schema_version:
          type: string
          enum:
            - telemetry-ingest-response.v1
        accepted:
          type: integer
          format: int32
        rejected:
          type: integer
          format: int32
        retry_after_seconds:
          type: integer
          format: int32
    Tool:
      type: object
      required:
        - meta
        - tool_id
        - name
        - input_schema
        - side_effect_level
        - data_access_level
        - risk_level
        - category
        - source
        - declared_by_agent_ids
        - observed_by_agent_ids
        - reachable_resource_ids
        - required_entitlements
        - schema_fingerprint
        - policy_coverage
        - pep_bindings
        - observation_count_24h
        - deny_count_24h
        - allow_count_24h
      properties:
        meta:
          $ref: '#/components/schemas/ObjectMeta'
        tool_id:
          type: string
        mcp_server_id:
          type: string
        name:
          type: string
        description:
          type: string
        input_schema: {}
        output_schema: {}
        side_effect_level:
          type: string
        data_access_level:
          type: string
        risk_level:
          type: string
        category:
          type: string
        source:
          type: string
        declared_by_agent_ids:
          type: array
          items:
            type: string
        observed_by_agent_ids:
          type: array
          items:
            type: string
        reachable_resource_ids:
          type: array
