[package]
name = "pollen-contract"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
time = { version = "0.3", features = ["serde", "formatting"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
regress = "0.10"
schemars = { version = "0.8", features = ["chrono"] }

[build-dependencies]
serde_json = "1"
typify = "0.4"
schemars = "0.8"
