asyncapi: 3.0.0
info:
  title: Pollek Cloud-DEK SSE Contract
  version: 1.0.0
servers:
  cloud:
    host: api.pollek.cloud
    protocol: https
  local:
    host: 127.0.0.1:17891
    protocol: http
channels:
  bundleEvents:
    address: /v1/tenants/{tenantId}/devices/{deviceId}/events
    messages:
      BundleReady:
        $ref: "#/components/messages/BundleReady"
      ContractDeprecated:
        $ref: "#/components/messages/ContractDeprecated"
  telemetryObservations:
    address: /v1/tenants/{tenantId}/telemetry/observations/stream
    messages:
      AgentObservation:
        $ref: "#/components/messages/AgentObservation"
  inventoryResources:
    address: /v1/tenants/{tenantId}/telemetry/resources/stream
    messages:
      ResourceAccess:
        $ref: "#/components/messages/ResourceAccess"
  inventoryTools:
    address: /v1/tenants/{tenantId}/telemetry/tools/stream
    messages:
      ToolUsage:
        $ref: "#/components/messages/ToolUsage"
  inventoryIdentities:
    address: /v1/tenants/{tenantId}/telemetry/identities/stream
    messages:
      IdentityAccess:
        $ref: "#/components/messages/IdentityAccess"
  usageStream:
    address: /v1/tenants/{tenantId}/usage/stream
    messages:
      AiUsageStreamEvent:
        $ref: "#/components/messages/AiUsageStreamEvent"
operations:
  receiveBundleEvents:
    action: receive
    channel:
      $ref: "#/channels/bundleEvents"
  receiveTelemetryObservations:
    action: receive
    channel:
      $ref: "#/channels/telemetryObservations"
  receiveInventoryResources:
    action: receive
    channel:
      $ref: "#/channels/inventoryResources"
  receiveInventoryTools:
    action: receive
    channel:
      $ref: "#/channels/inventoryTools"
  receiveInventoryIdentities:
    action: receive
    channel:
      $ref: "#/channels/inventoryIdentities"
  receiveUsageStream:
    action: receive
    channel:
      $ref: "#/channels/usageStream"
components:
  messages:
    BundleReady:
      name: BundleReady
      title: BundleReady
      payload:
        $ref: "#/components/schemas/BundleReadyPayload"
    ContractDeprecated:
      name: ContractDeprecated
      title: ContractDeprecated
      payload:
        $ref: "#/components/schemas/ContractDeprecatedPayload"
    AgentObservation:
      name: AgentObservation
      title: AgentObservation
      payload:
        $ref: "#/components/schemas/AgentObservationPayload"
    ResourceAccess:
      name: ResourceAccess
      title: ResourceAccess
      payload:
        $ref: "#/components/schemas/ResourceAccessPayload"
    ToolUsage:
      name: ToolUsage
      title: ToolUsage
      payload:
        $ref: "#/components/schemas/ToolUsagePayload"
    IdentityAccess:
      name: IdentityAccess
      title: IdentityAccess
      payload:
        $ref: "#/components/schemas/IdentityAccessPayload"
    AiUsageStreamEvent:
      name: AiUsageStreamEvent
      title: AiUsageStreamEvent
      payload:
        $ref: "#/components/schemas/AiUsageStreamPayload"
  schemas:
    AgentObservationPayload:
      type: object
      additionalProperties: true
    ResourceAccessPayload:
      type: object
      additionalProperties: true
    ToolUsagePayload:
      type: object
      additionalProperties: true
    IdentityAccessPayload:
      type: object
      additionalProperties: true
    AiUsageStreamPayload:
      type: object
      additionalProperties: false
      required: [type, data]
      properties:
        type:
          type: string
          enum: [ai_usage_event, ai_budget_alert]
        data:
          type: object
          additionalProperties: true
    BundleReadyPayload:
      type: object
      additionalProperties: false
      required: [schema_version, tenant_id, device_id, generation]
      properties:
        schema_version:
          const: sse.bundle-ready.v1
        tenant_id:
          type: string
        device_id:
          type: string
        generation:
          type: integer
        reason:
          type: string
    ContractDeprecatedPayload:
      type: object
      additionalProperties: false
      required: [schema_version, contract_version, sunset]
      properties:
        schema_version:
          const: sse.contract-deprecated.v1
        contract_version:
          type: string
        sunset:
          type: string
          format: date-time
        migration_url:
          type: string
