extends:
  - spectral:oas

rules:
  pollek-operation-id-required:
    description: Every operation must have operationId for stable codegen.
    severity: error
    given: $.paths[*][*]
    then:
      field: operationId
      function: truthy

  pollek-contract-version-header-required:
    description: Every operation must document X-Pollek-Contract-Version.
    severity: warn
    given: $.paths[*][*].parameters
    then:
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            properties:
              name:
                const: X-Pollek-Contract-Version
              in:
                const: header

  pollek-error-envelope-required:
    description: Operations should document standard error response.
    severity: warn
    given: $.paths[*][*].responses
    then:
      field: "default"
      function: truthy
