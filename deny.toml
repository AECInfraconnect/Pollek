[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "MIT-0",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[advisories]
ignore = [
    # owner: @AECInfraconnect/security, expiry: 2026-09-20, issue: https://github.com/AECInfraconnect/Pollek/issues/1001, reason: Awaiting upstream patch from ring/aws-lc-rs for exploitability
    "RUSTSEC-2025-0134",
    # owner: @AECInfraconnect/security, expiry: 2026-09-20, issue: https://github.com/AECInfraconnect/Pollek/issues/1002, reason: Under investigation for impact on local-control-plane
    "RUSTSEC-2026-0086",
    # owner: @AECInfraconnect/security, expiry: 2026-09-20, issue: https://github.com/AECInfraconnect/Pollek/issues/1003, reason: Waiting for tracing-subscriber fix release
    "RUSTSEC-2026-0088",
    # owner: @AECInfraconnect/security, expiry: 2026-09-20, issue: https://github.com/AECInfraconnect/Pollek/issues/1004, reason: Not exploitable in our environment, awaiting dependency bump
    "RUSTSEC-2026-0089",
    # owner: @AECInfraconnect/security, expiry: 2026-09-20, issue: https://github.com/AECInfraconnect/Pollek/issues/1005, reason: Awaiting fix for async-trait issue
    "RUSTSEC-2026-0094",
    # owner: @AECInfraconnect/security, expiry: 2026-09-20, issue: https://github.com/AECInfraconnect/Pollek/issues/1006, reason: Awaiting fix for reqwest TLS vulnerability
    "RUSTSEC-2026-0095",
    # owner: @AECInfraconnect/security, expiry: 2026-09-20, issue: https://github.com/AECInfraconnect/Pollek/issues/1007, reason: Awaiting tokio patch for timer exploit
    "RUSTSEC-2026-0096",
    # owner: @AECInfraconnect/security, expiry: 2026-12-31, issue: https://github.com/AECInfraconnect/Pollek/issues/1008, reason: derivative is unmaintained, transitive from keyring/zbus, no patch available
    "RUSTSEC-2024-0388",
    # owner: @AECInfraconnect/security, expiry: 2026-12-31, issue: https://github.com/AECInfraconnect/Pollek/issues/1009, reason: fxhash is unmaintained, transitive from wasmtime, no patch available
    "RUSTSEC-2025-0057",
    # owner: @AECInfraconnect/security, expiry: 2026-12-31, issue: https://github.com/AECInfraconnect/Pollek/issues/1010, reason: instant is unmaintained, transitive from fastrand
    "RUSTSEC-2024-0384",
    # owner: @AECInfraconnect/security, expiry: 2026-12-31, issue: https://github.com/AECInfraconnect/Pollek/issues/1011, reason: paste is unmaintained, transitive from wasmtime
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
skip = []
