name: Docs Validation

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "*.md"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check README promise task list
        run: python3 scripts/check_readme_promises.py
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            docs/**/*.md
            *.md
