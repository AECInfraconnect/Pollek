name: Docs Validation

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "*.md"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check README promise task list
        run: python3 scripts/check_readme_promises.py
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: |
            docs/**/*.md
            *.md
