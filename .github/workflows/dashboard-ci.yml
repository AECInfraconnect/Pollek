name: dashboard-ci

on:
  push:
    branches: [main]
    paths:
      - "apps/local-admin-dashboard/**"
      - "contracts/generated/typescript/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    paths:
      - "apps/local-admin-dashboard/**"
      - "contracts/generated/typescript/**"
      - ".github/workflows/dashboard-ci.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/local-admin-dashboard

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: apps/local-admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check i18n Coverage
        run: npm run i18n:check

      - name: Unit Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Axe WCAG Gate
        run: npm run a11y

      - name: Visual QA Screenshots
        run: npm run visual:qa

      - name: Run E2E Smoke Tests
        run: npm run e2e
