name: Discovery CI

on:
  push:
    paths:
      - 'crates/dek-agent-discovery/**'
      - '.github/workflows/discovery-ci.yml'
  pull_request:
    paths:
      - 'crates/dek-agent-discovery/**'
      - '.github/workflows/discovery-ci.yml'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run discovery crate tests
        run: cargo test -p dek-agent-discovery
