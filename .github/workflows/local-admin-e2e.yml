name: local-admin-e2e

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  local-admin-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/local-admin-dashboard/package-lock.json

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin

      - name: Build dashboard
        working-directory: apps/local-admin-dashboard
        run: |
          npm ci
          npm run build

      - name: Run local admin E2E
        run: bash scripts/e2e-local-admin.sh
