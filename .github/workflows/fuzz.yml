name: Fuzzing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  fuzz:
    name: Run cargo-fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Fuzz mcp_normalize
        run: cargo +nightly fuzz run normalize -- -max_total_time=60
        working-directory: fuzz

      - name: Fuzz policy_preset_render
        run: cargo +nightly fuzz run fuzz_policy_preset_render -- -max_total_time=60
        working-directory: fuzz
