name: Security Audit

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # main
      - name: Install cargo-audit
        run: cargo binstall -y cargo-audit
      - name: Run cargo audit
        run: cargo audit --json | tee cargo-audit.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: cargo-audit-report
          path: cargo-audit.json

  geiger:
    name: Cargo Geiger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # main
      - name: Install cargo-geiger
        run: cargo binstall -y cargo-geiger
      - name: Generate geiger reports
        shell: bash
        run: |
          mkdir -p target/security
          for dir in crates/*/ plugins/*/ apps/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              name="$(echo "$dir" | tr '/ ' '__')"
              (cd "$dir" && cargo geiger) > "target/security/${name}.geiger.txt" 2>&1 || true
            fi
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: cargo-geiger-reports
          path: target/security/*.geiger.txt

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87 # v2
        with:
          command: check advisories bans licenses sources

  secret_scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . -v

  machete:
    name: Cargo Machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # main
      - name: Install cargo-machete
        run: cargo binstall -y cargo-machete
      - name: Run cargo machete
        continue-on-error: true
        run: cargo machete
