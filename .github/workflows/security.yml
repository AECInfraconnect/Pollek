name: Security Audit

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cargo-bins/cargo-binstall@ead08b90bd7b2e6d81963fb9cf0b7239f66d5db4 # main
      - name: Install cargo-audit
        run: cargo binstall -y cargo-audit
      - name: Run cargo audit
        run: cargo audit --json | tee cargo-audit.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: cargo-audit-report
          path: cargo-audit.json

  geiger:
    name: Cargo Geiger
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cargo-bins/cargo-binstall@ead08b90bd7b2e6d81963fb9cf0b7239f66d5db4 # main
      - name: Install cargo-geiger
        run: cargo binstall -y cargo-geiger
      - name: Generate geiger reports
        shell: bash
        run: |
          set +e
          mkdir -p target/security
          timeout 25m cargo geiger --workspace --all-targets > target/security/workspace.geiger.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo
              echo "cargo geiger exited with status ${status}; this report is best-effort and non-blocking."
            } >> target/security/workspace.geiger.txt
          fi
          exit 0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: cargo-geiger-reports
          path: target/security/*.geiger.txt

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check advisory ignore metadata
        run: node scripts/security/check-deny-ignore-metadata.mjs
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check advisories bans licenses sources

  secret_scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . -v

  machete:
    name: Cargo Machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cargo-bins/cargo-binstall@ead08b90bd7b2e6d81963fb9cf0b7239f66d5db4 # main
      - name: Install cargo-machete
        run: cargo binstall -y cargo-machete
      - name: Run cargo machete
        continue-on-error: true
        run: cargo machete
