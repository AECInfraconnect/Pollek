name: Release Dry Run

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  dry_run_release:
    name: Dry Run Release Packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install target for repository toolchain
        run: rustup target add aarch64-unknown-linux-gnu
      - name: Install cross-compilation tools (Linux arm64)
        run: |
          sudo dpkg --add-architecture arm64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types: deb/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi
          sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources > /dev/null <<'EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports noble-security
          Components: main restricted universe multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu pkg-config libssl-dev:arm64
      - name: Build all artifacts (x86_64)
        run: cargo build --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin --release
      - name: Build all artifacts (aarch64)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: cargo build --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin --release --target aarch64-unknown-linux-gnu
      - name: Compress binaries
        run: |
          mkdir -p dist
          cp target/release/dek-* dist/ 2>/dev/null || true
          tar -czvf dek-linux-amd64.tar.gz -C dist/ .
      - name: Verify package size and contents
        run: |
          ls -lh dek-linux-amd64.tar.gz
          tar -tzf dek-linux-amd64.tar.gz
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: "22"
      - name: Build local admin dashboard
        working-directory: apps/local-admin-dashboard
        run: |
          npm ci
          npm run build
      - name: Build .deb and verify the dashboard is packaged at the standard path
        run: |
          cargo install cargo-deb --locked
          cargo deb -p dek-core
          DEB=$(ls target/debian/*.deb | head -n1)
          echo "Inspecting $DEB"
          dpkg -c "$DEB" | tee /tmp/deb-contents.txt
          grep -q "usr/share/pollek-dek/dashboard/index.html" /tmp/deb-contents.txt
          grep -q "usr/bin/local-control-plane" /tmp/deb-contents.txt
          grep -q "usr/share/pollek-dek/dashboard/assets/" /tmp/deb-contents.txt
