name: Release Dry Run

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  dry_run_release:
    name: Dry Run Release Packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cross-compilation tools (Linux arm64)
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
      - name: Set cross-compilation env (Linux arm64)
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build all artifacts (x86_64)
        run: cargo build --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin --release
      - name: Build all artifacts (aarch64)
        run: cargo build --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin --release --target aarch64-unknown-linux-gnu
      - name: Compress binaries
        run: |
          mkdir -p dist
          cp target/release/dek-* dist/ 2>/dev/null || true
          tar -czvf dek-linux-amd64.tar.gz -C dist/ .
      - name: Verify package size and contents
        run: |
          ls -lh dek-linux-amd64.tar.gz
          tar -tzf dek-linux-amd64.tar.gz
