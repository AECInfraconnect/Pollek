name: Release Supply Chain

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag"
        required: true
        default: "v1.0.0-beta.10"

permissions:
  contents: write
  id-token: write # Required for cosign keyless (OIDC) signing and GitHub Attestations
  attestations: write

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Verify Tag Matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -n 1 | awk -F'"' '{print $2}')
          TAG_VERSION=${RELEASE_TAG#v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match Cargo.toml workspace version ($CARGO_VERSION)"
            exit 1
          fi

  build:
    needs: preflight
    name: Build Binaries (Auditable)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pollek-dek-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: pollek-dek-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: pollek-dek-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: pollek-dek-windows-arm64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: pollek-dek-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: pollek-dek-macos-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install target for repository toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types: deb/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi
          sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources > /dev/null <<'EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports noble-security
          Components: main restricted universe multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu pkg-config libssl-dev:arm64

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # main

      - name: Install cargo-auditable
        run: cargo binstall -y cargo-auditable

      - name: Build Auditable Binaries (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: cargo auditable build --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin --release --target ${{ matrix.target }}

      - name: Build Auditable Binaries
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo auditable build --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin --release --target ${{ matrix.target }}

      - name: Stage Artifacts
        shell: bash
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/dek-core staging/dek-core || cp target/${{ matrix.target }}/release/dek-core.exe staging/dek-core.exe
          cp target/${{ matrix.target }}/release/dek-mcp-proxy staging/dek-mcp-proxy || cp target/${{ matrix.target }}/release/dek-mcp-proxy.exe staging/dek-mcp-proxy.exe
          cp target/${{ matrix.target }}/release/dek-ext-authz staging/dek-ext-authz || cp target/${{ matrix.target }}/release/dek-ext-authz.exe staging/dek-ext-authz.exe
          cp target/${{ matrix.target }}/release/dek-cli staging/dek-cli || cp target/${{ matrix.target }}/release/dek-cli.exe staging/dek-cli.exe

      - name: Sign macOS Binaries
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERT_B64: ${{ secrets.APPLE_CERT_B64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERT_B64" ]; then
            if [[ ! "$RELEASE_TAG" == *"-"* ]]; then
              echo "Error: Production release requires macOS signing certificates"
              exit 1
            fi
            echo "Skipping macOS signing for pre-release because cert is missing."
            exit 0
          fi
          echo "$APPLE_CERT_B64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          codesign --force --options runtime --sign "Developer ID Application" staging/dek-core
          codesign --force --options runtime --sign "Developer ID Application" staging/dek-mcp-proxy
          codesign --force --options runtime --sign "Developer ID Application" staging/dek-ext-authz
          codesign --force --options runtime --sign "Developer ID Application" staging/dek-cli

          # Zip for notarization
          ditto -c -k --keepParent staging staging.zip
          xcrun notarytool submit staging.zip --apple-id "$APPLE_DEV_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple staging/dek-core
          xcrun stapler staple staging/dek-mcp-proxy
          xcrun stapler staple staging/dek-ext-authz
          xcrun stapler staple staging/dek-cli

      - name: Sign Windows Binaries
        if: matrix.os == 'windows-latest'
        env:
          WINDOWS_PFX_B64: ${{ secrets.WINDOWS_PFX_B64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        shell: powershell
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_PFX_B64)) {
            if (-not ($env:RELEASE_TAG -match "-")) {
              Write-Error "Production release requires Windows signing certificates"
              exit 1
            }
            Write-Host "Skipping Windows signing for pre-release because cert is missing."
            exit 0
          }
          $pfxBytes = [System.Convert]::FromBase64String($env:WINDOWS_PFX_B64)
          [IO.File]::WriteAllBytes("cert.pfx", $pfxBytes)
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe" sign /f cert.pfx /p $env:WINDOWS_PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 staging\dek-core.exe staging\dek-mcp-proxy.exe staging\dek-ext-authz.exe staging\dek-cli.exe

      - name: Package (Linux .deb + tar.gz)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # shellcheck disable=SC2035
          cargo install cargo-deb --locked || true
          cargo deb -p dek-core --no-build --target ${{ matrix.target }} || true
          cd staging
          tar -czvf ../${{ matrix.artifact_name }}.tar.gz ./*
          cp ../target/${{ matrix.target }}/debian/*.deb ../ || true

      - name: Package (Windows zip)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Compress-Archive -Path staging\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Package (macOS tar.gz)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # shellcheck disable=SC2035
          cd staging
          tar -czvf ../${{ matrix.artifact_name }}.tar.gz ./*

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
            *.deb

  ebpf:
    name: Build eBPF Bytecode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build eBPF Object
        run: cargo +nightly build --manifest-path crates/dek-ebpf-prog/Cargo.toml --target bpfel-unknown-none -Z build-std=core --release

      - name: Extract eBPF Artifact
        run: |
          cp crates/dek-ebpf-prog/target/bpfel-unknown-none/release/dek-ebpf-prog dek-ebpf-prog.bpf.o

      - name: Upload eBPF Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dek-ebpf-prog.bpf.o
          path: dek-ebpf-prog.bpf.o

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install cargo-cyclonedx
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # main
      - run: cargo binstall -y cargo-cyclonedx

      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --format json --all-features -o pollek-dek.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pollek-dek-sboms
          path: "pollek-dek.cdx.json"

  release:
    name: Publish Release
    needs: [build, ebpf, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release_artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: release_artifacts
        run: find . -type f -exec sha256sum {} + > SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Sign Artifacts (Keyless)
        working-directory: release_artifacts
        run: |
          # shellcheck disable=SC2162
          # Keyless signing creates .sig and .pem files per artifact bound to the GitHub runner OIDC token
          find . -type f ! -name "SHA256SUMS" | while read -r file; do
            cosign sign-blob --yes --output-signature "$file.sig" --output-certificate "$file.pem" "$file"
          done

      - name: Verify Signatures (Self-Check)
        working-directory: release_artifacts
        run: |
          # Verify that we correctly signed our own artifacts before publishing
          # This acts as an integrity check to prevent releasing unsigned binaries
          for file in *.tar.gz *.zip *.deb; do
            if [ -f "$file" ]; then
              cosign verify-blob \
                --certificate "$file.pem" \
                --signature "$file.sig" \
                --certificate-identity-regexp "^https://github.com/AECInfraconnect/AntiG_Pollen_DEK/.*" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                "$file"
            fi
          done

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "release_artifacts/*"

      - name: Attest SBOM
        uses: actions/attest-sbom@5122b253c73d544ca1c5f71dd022f470df08b461 # v2.1.0
        with:
          subject-path: "release_artifacts/*.tar.gz"
          sbom-path: "release_artifacts/pollek-dek.cdx.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: |
            release_artifacts/*
          generate_release_notes: true

# Verification Instructions for End-Users:
#
# 1. Verify Checksums:
#    sha256sum -c SHA256SUMS
#
# 2. Verify Cosign Keyless Signatures:
#    cosign verify-blob \
#      --certificate pollek-dek-linux-amd64.tar.gz.pem \
#      --signature pollek-dek-linux-amd64.tar.gz.sig \
