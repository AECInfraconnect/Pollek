name: Release Supply Chain

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag"
        required: true
        default: "v1.0.0-beta.1"

permissions:
  contents: write
  id-token: write # Required for cosign keyless (OIDC) signing

jobs:
  build:
    name: Build Binaries (Auditable)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pollen-dek-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: pollen-dek-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: pollen-dek-macos-amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-auditable
        run: cargo install cargo-auditable

      - name: Build Auditable Binaries
        run: cargo auditable build --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --release --target ${{ matrix.target }}

      - name: Stage Artifacts
        shell: bash
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/dek-core staging/dek-core || cp target/${{ matrix.target }}/release/dek-core.exe staging/dek-core.exe
          cp target/${{ matrix.target }}/release/dek-mcp-proxy staging/dek-mcp-proxy || cp target/${{ matrix.target }}/release/dek-mcp-proxy.exe staging/dek-mcp-proxy.exe
          cp target/${{ matrix.target }}/release/dek-ext-authz staging/dek-ext-authz || cp target/${{ matrix.target }}/release/dek-ext-authz.exe staging/dek-ext-authz.exe
          
      - name: Sign macOS Binaries
        if: matrix.os == 'macos-latest' && env.APPLE_CERT_B64 != ''
        env:
          APPLE_CERT_B64: ${{ secrets.APPLE_CERT_B64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "$APPLE_CERT_B64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          
          codesign --force --options runtime --sign "Developer ID Application" staging/dek-core
          codesign --force --options runtime --sign "Developer ID Application" staging/dek-mcp-proxy
          codesign --force --options runtime --sign "Developer ID Application" staging/dek-ext-authz
          
          # Zip for notarization
          ditto -c -k --keepParent staging staging.zip
          xcrun notarytool submit staging.zip --apple-id "$APPLE_DEV_ID" --password "$APPLE_APP_PASSWORD" --team-id "YOUR_TEAM_ID" --wait
          xcrun stapler staple staging/dek-core
          xcrun stapler staple staging/dek-mcp-proxy
          xcrun stapler staple staging/dek-ext-authz

      - name: Sign Windows Binaries
        if: matrix.os == 'windows-latest' && env.WINDOWS_PFX_B64 != ''
        env:
          WINDOWS_PFX_B64: ${{ secrets.WINDOWS_PFX_B64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        shell: powershell
        run: |
          $pfxBytes = [System.Convert]::FromBase64String($env:WINDOWS_PFX_B64)
          [IO.File]::WriteAllBytes("cert.pfx", $pfxBytes)
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe" sign /f cert.pfx /p $env:WINDOWS_PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 staging\dek-core.exe staging\dek-mcp-proxy.exe staging\dek-ext-authz.exe

      - name: Package (Linux .deb + tar.gz)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cargo install cargo-deb --locked || true
          cargo deb -p dek-core --no-build --target ${{ matrix.target }} || true
          cd staging
          tar -czvf ../${{ matrix.artifact_name }}.tar.gz *
          cp ../target/${{ matrix.target }}/debian/*.deb ../ || true

      - name: Package (Windows zip)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Compress-Archive -Path staging\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Package (macOS tar.gz)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd staging
          tar -czvf ../${{ matrix.artifact_name }}.tar.gz *

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
            *.deb

  ebpf:
    name: Build eBPF Bytecode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build eBPF Object
        run: cargo build -p dek-ebpf-prog --target bpfel-unknown-none -Z build-std=core --release

      - name: Extract eBPF Artifact
        run: |
          cp target/bpfel-unknown-none/release/dek-ebpf-prog dek-ebpf-prog.bpf.o

      - name: Upload eBPF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dek-ebpf-prog.bpf.o
          path: dek-ebpf-prog.bpf.o

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --all --format json --output-pattern pollen-dek-sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: pollen-dek-sbom.json
          path: pollen-dek-sbom.json

  release:
    name: Publish Release
    needs: [build, ebpf, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: release_artifacts
        run: sha256sum * > SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign Artifacts (Keyless)
        working-directory: release_artifacts
        run: |
          # Keyless signing creates .sig and .pem files per artifact bound to the GitHub runner OIDC token
          for file in *; do
            if [ -f "$file" ]; then
              cosign sign-blob --yes --output-signature "$file.sig" --output-certificate "$file.pem" "$file"
            fi
          done

      - name: Verify Signatures (Self-Check)
        working-directory: release_artifacts
        run: |
          # Verify that we correctly signed our own artifacts before publishing
          # This acts as an integrity check to prevent releasing unsigned binaries
          for file in *.tar.gz *.zip *.deb; do
            if [ -f "$file" ]; then
              cosign verify-blob \
                --certificate "$file.pem" \
                --signature "$file.sig" \
                --certificate-identity-regexp "^https://github.com/AECInfraconnect/AntiG_Pollen_DEK/.*" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                "$file"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release_artifacts/*
          generate_release_notes: true

# Verification Instructions for End-Users:
