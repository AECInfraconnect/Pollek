name: Release Gate

on:
  push:
    tags:
      - "v*-beta*"

permissions:
  contents: read

jobs:
  release-gate:
    name: v1.0.0-beta Release Gate
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Clippy (Enforce unwrap/expect gate)
        run: cargo clippy --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

      - name: Unit and Contract Tests
        run: cargo test --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin

      - name: Local control-plane e2e
        run: cargo test -p acceptance-tests --test local_e2e -- --ignored --nocapture --test-threads=1

      - name: Benchmark Baseline Check
        run: cargo bench -p dek-cedar

      - name: Install Security Tools
        uses: cargo-bins/cargo-binstall@ead08b90bd7b2e6d81963fb9cf0b7239f66d5db4 # main
      - run: cargo binstall -y cargo-audit cargo-deny

      - name: Security Audit (cargo audit)
        continue-on-error: true
        run: cargo audit

      - name: Security Deny (cargo deny)
        continue-on-error: true
        run: cargo deny check

      - name: Gitleaks (Detect secrets)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . -v

      - name: Build Release Binaries
        run: cargo build --release --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin

      - name: End-to-End Local Smoke Test
        if: runner.os == 'Linux'
        run: bash scripts/smoke/install_and_run.sh
