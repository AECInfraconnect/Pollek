name: Release Gate

on:
  push:
    tags:
      - 'v*-beta*'

jobs:
  release-gate:
    name: v1.0.0-beta Release Gate
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy (Enforce unwrap/expect gate)
        run: cargo clippy --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

      - name: Unit and Contract Tests
        run: cargo test --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin

      - name: Local control-plane e2e
        run: cargo test -p acceptance-tests --test local_e2e -- --ignored --nocapture --test-threads=1

      - name: Benchmark Baseline Check
        run: cargo bench -p dek-cedar

      - name: Install Security Tools
        run: |
          cargo install cargo-audit
          cargo install cargo-deny

      - name: Security Audit (cargo audit)
        run: cargo audit

      - name: Security Deny (cargo deny)
        run: cargo deny check

      - name: Gitleaks (Detect secrets)
        uses: gitleaks/gitleaks-action@v2

      - name: Build Binaries (Acceptance Matrix A-J)
        run: cargo build --release --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin

  build-artifacts:
    name: Build & Package Release Artifacts
    needs: release-gate
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: deb
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: deb
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: pkg
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: pkg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cross (for cross-compilation)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install cargo-deb
        if: matrix.ext == 'deb'
        run: cargo install cargo-deb

      - name: Build and Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.ext }}" == "deb" ]; then
            if [ "${{ matrix.target }}" != "x86_64-unknown-linux-gnu" ]; then
              cargo deb -p dek-core --target ${{ matrix.target }} -o dist/pollen-dek-${{ matrix.target }}.deb
            else
              cargo deb -p dek-core -o dist/pollen-dek-${{ matrix.target }}.deb
            fi
          elif [ "${{ matrix.ext }}" == "msi" ]; then
            cargo build --release --target ${{ matrix.target }} --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin
            candle.exe packaging/windows/pollen-dek.wxs -out target/pollen-dek.wixobj
            light.exe -ext WixUIExtension target/pollen-dek.wixobj -o dist/pollen-dek-${{ matrix.target }}.msi
          elif [ "${{ matrix.ext }}" == "pkg" ]; then
            cargo build --release --target ${{ matrix.target }} --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin
            mkdir -p target/pkg_root/usr/local/bin
            mkdir -p target/pkg_root/Library/LaunchDaemons
            cp target/${{ matrix.target }}/release/dek-core target/pkg_root/usr/local/bin/
            cp target/${{ matrix.target }}/release/dek-mcp-proxy target/pkg_root/usr/local/bin/
            cp target/${{ matrix.target }}/release/dek-updater target/pkg_root/usr/local/bin/
            cp packaging/macos/ai.pollen.dek.plist target/pkg_root/Library/LaunchDaemons/
            pkgbuild --root target/pkg_root --identifier ai.pollen.dek --version 1.0.0 dist/pollen-dek-${{ matrix.target }}.pkg
          fi

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          output-file: dist/pollen-dek-${{ matrix.target }}-sbom.spdx.json

      - name: Sign Artifacts (Cosign)
        uses: sigstore/cosign-installer@v3.1.1
      - run: |
          cosign sign-blob --yes --output-signature dist/pollen-dek-${{ matrix.target }}.${{ matrix.ext }}.sig dist/pollen-dek-${{ matrix.target }}.${{ matrix.ext }}
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pollen-dek-${{ matrix.target }}
          path: dist/*
