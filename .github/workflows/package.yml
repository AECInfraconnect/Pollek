name: Packaging Pipeline

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: "22"
      - name: Build local admin dashboard
        working-directory: apps/local-admin-dashboard
        run: |
          npm ci
          npm run build
      - run: cargo install cargo-deb
      - run: cargo build --release --locked -p dek-core -p dek-mcp-proxy -p dek-updater -p local-control-plane
      - run: cargo deb -p dek-core
      - name: Verify dashboard is packaged at the standard path
        run: |
          DEB=$(ls target/debian/*.deb | head -n1)
          echo "Inspecting $DEB"
          dpkg -c "$DEB" | tee /tmp/deb-contents.txt
          grep -q "usr/share/pollek-dek/dashboard/index.html" /tmp/deb-contents.txt
          grep -q "usr/bin/local-control-plane" /tmp/deb-contents.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: pollek-dek-linux-deb
          path: target/debian/*.deb

  build-windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: "22"
      - name: Build local admin dashboard
        working-directory: apps/local-admin-dashboard
        run: |
          npm ci
          npm run build
      - run: cargo build --release --locked -p dek-core -p dek-mcp-proxy -p dek-updater -p local-control-plane
      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          mkdir -Force target/wix | Out-Null
          # Harvest the built dashboard assets into a WiX fragment (ComponentGroup
          # HarvestedDashboard, directory ref DASHBOARDDIR) referenced by pollek-dek.wxs.
          heat.exe dir apps/local-admin-dashboard/dist `
            -nologo -cg HarvestedDashboard -dr DASHBOARDDIR -srd -sreg -scom -sfrag -gg -g1 `
            -var var.DashboardSource -out target/wix/dashboard.wxs
          candle.exe -nologo -dDashboardSource=apps/local-admin-dashboard/dist `
            packaging/windows/pollek-dek.wxs target/wix/dashboard.wxs -out target/wix/
          light.exe -nologo -ext WixUIExtension `
            target/wix/pollek-dek.wixobj target/wix/dashboard.wixobj -o target/wix/pollek-dek.msi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: pollek-dek-windows-msi
          path: target/wix/*.msi

  build-macos-pkg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: "22"
      - name: Build local admin dashboard
        working-directory: apps/local-admin-dashboard
        run: |
          npm ci
          npm run build
      - run: cargo build --release --locked -p dek-core -p dek-mcp-proxy -p dek-updater -p local-control-plane
      - name: Build macOS PKG
        run: |
          mkdir -p target/pkg/root/usr/local/bin
          mkdir -p target/pkg/root/usr/local/share/pollek-dek/dashboard
          mkdir -p target/pkg/root/Library/LaunchDaemons
          cp target/release/dek-core target/pkg/root/usr/local/bin/
          cp target/release/dek-mcp-proxy target/pkg/root/usr/local/bin/
          cp target/release/dek-updater target/pkg/root/usr/local/bin/
          cp target/release/local-control-plane target/pkg/root/usr/local/bin/
          cp -R apps/local-admin-dashboard/dist/ target/pkg/root/usr/local/share/pollek-dek/dashboard/
          cp packaging/macos/ai.pollek.dek.plist target/pkg/root/Library/LaunchDaemons/
          cp packaging/macos/ai.pollek.dek.dashboard.plist target/pkg/root/Library/LaunchDaemons/
          test -f target/pkg/root/usr/local/share/pollek-dek/dashboard/index.html
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="dek-core") | .version')
          pkgbuild --root target/pkg/root --identifier ai.pollek.dek --version "$VERSION" "target/pollek-dek-macos-${VERSION}.pkg"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: pollek-dek-macos-pkg
          path: target/*.pkg
