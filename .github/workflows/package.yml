name: Packaging Pipeline

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo install cargo-deb
      - run: cargo build --release --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin
      - run: cargo deb -p dek-core
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pollen-dek-linux-deb
          path: target/debian/*.deb

  build-windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo build --release --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin
      - run: |
          mkdir -p target/wix
          candle.exe packaging/windows/pollen-dek.wxs -out target/pollen-dek.wixobj
          light.exe -ext WixUIExtension target/pollen-dek.wixobj -o target/wix/pollen-dek.msi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pollen-dek-windows-msi
          path: target/wix/*.msi

  build-macos-pkg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo build --release --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin
      - name: Build macOS PKG
        run: |
          mkdir -p target/pkg/root/usr/local/bin
          mkdir -p target/pkg/root/Library/LaunchDaemons
          cp target/release/dek-core target/pkg/root/usr/local/bin/
          cp target/release/dek-mcp-proxy target/pkg/root/usr/local/bin/
          cp target/release/dek-updater target/pkg/root/usr/local/bin/
          cp packaging/macos/ai.pollen.dek.plist target/pkg/root/Library/LaunchDaemons/
          pkgbuild --root target/pkg/root --identifier ai.pollen.dek --version 1.0.0 target/pollen-dek-macos.pkg
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pollen-dek-macos-pkg
          path: target/*.pkg
