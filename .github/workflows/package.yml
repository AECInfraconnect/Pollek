name: Packaging Pipeline

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo install cargo-deb
      - run: cargo build --release --locked -p dek-core -p dek-mcp-proxy -p dek-updater
      - run: cargo deb -p dek-core
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pollek-dek-linux-deb
          path: target/debian/*.deb

  build-windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo build --release --locked -p dek-core -p dek-mcp-proxy -p dek-updater
      - run: |
          mkdir -p target/wix
          candle.exe packaging/windows/pollek-dek.wxs -out target/pollek-dek.wixobj
          light.exe -ext WixUIExtension target/pollek-dek.wixobj -o target/wix/pollek-dek.msi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pollek-dek-windows-msi
          path: target/wix/*.msi

  build-macos-pkg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo build --release --locked -p dek-core -p dek-mcp-proxy -p dek-updater
      - name: Build macOS PKG
        run: |
          mkdir -p target/pkg/root/usr/local/bin
          mkdir -p target/pkg/root/Library/LaunchDaemons
          cp target/release/dek-core target/pkg/root/usr/local/bin/
          cp target/release/dek-mcp-proxy target/pkg/root/usr/local/bin/
          cp target/release/dek-updater target/pkg/root/usr/local/bin/
          cp packaging/macos/ai.pollek.dek.plist target/pkg/root/Library/LaunchDaemons/
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="dek-core") | .version')
          pkgbuild --root target/pkg/root --identifier ai.pollek.dek --version "$VERSION" "target/pollek-dek-macos-${VERSION}.pkg"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pollek-dek-macos-pkg
          path: target/*.pkg
