name: Packaging Pipeline

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deb
      - run: cargo build --release --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin
      - run: cargo deb -p dek-core
      - uses: actions/upload-artifact@v4
        with:
          name: pollen-dek-linux-deb
          path: target/debian/*.deb

  build-windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-wix
      - run: cargo build --release --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin
      - run: cargo wix --no-build -p dek-core -i packaging/windows/pollen-dek.wxs
      - uses: actions/upload-artifact@v4
        with:
          name: pollen-dek-windows-msi
          path: target/wix/*.msi

  build-macos-pkg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin
      - name: Build macOS PKG
        run: |
          mkdir -p target/pkg/root/usr/local/bin
          mkdir -p target/pkg/root/Library/LaunchDaemons
          cp target/release/dek-core target/pkg/root/usr/local/bin/
          cp target/release/dek-mcp-proxy target/pkg/root/usr/local/bin/
          cp target/release/dek-updater target/pkg/root/usr/local/bin/
          cp packaging/macos/ai.pollen.dek.plist target/pkg/root/Library/LaunchDaemons/
          pkgbuild --root target/pkg/root --identifier ai.pollen.dek --version 1.0.0 target/pollen-dek-macos.pkg
      - uses: actions/upload-artifact@v4
        with:
          name: pollen-dek-macos-pkg
          path: target/*.pkg
