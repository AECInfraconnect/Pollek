name: Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  acceptance_matrix:
    name: Acceptance Matrix (A-H)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Platform-specific target labels
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Run Acceptance Tests (JUnit & JSON)
      # We use nextest for junit. It ignores #[ignore] by default unless requested, wait!
      # We want to run the ignored test matrix_a_to_h
      run: cargo nextest run -p acceptance-tests --test matrix_a_to_k --run-ignored ignored-only --profile ci
      
    - name: Local control-plane e2e
      run: cargo test -p acceptance-tests --test local_e2e -- --ignored --nocapture --test-threads=1
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}
        path: target/nextest/ci/junit.xml
