name: Integration Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  local_e2e:
    name: Local control-plane e2e
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Platform-specific target labels
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Pre-build workspace binaries
        timeout-minutes: 40
        run: cargo build --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii-redactor-plugin

      - name: Local control-plane e2e
        run: cargo test -p acceptance-tests --test local_e2e -- --ignored --nocapture --test-threads=1
