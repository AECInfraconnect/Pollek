name: Schema Contract Validation

on:
  push:
    branches: ["main"]
    paths:
      - "docs/contracts/**"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/contracts/**"

permissions:
  contents: read

jobs:
  validate_schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Install Ajv CLI & Formats
        run: npm install -g ajv-cli ajv-formats

      - name: Validate schemas
        # --strict=false: unknown `format` values (e.g. uint16/uint32/uint64
        # emitted by the type generator) are advisory annotations per the JSON
        # Schema spec, not hard errors. ajv's default strict mode rejects them.
        run: |
          for file in docs/contracts/schemas/*.schema.json; do
            echo "Validating schema $file"
            ajv compile -s "$file" -c ajv-formats --strict=false || exit 1
          done

      - name: Validate sample payloads against schemas
        run: |
          ajv validate -c ajv-formats --strict=false -s docs/contracts/schemas/telemetry-event.schema.json -d docs/contracts/fixtures/decision_event.json
          ajv validate -c ajv-formats --strict=false -s docs/contracts/schemas/dek-device.schema.json -d docs/contracts/fixtures/device_register.json

  validate_openapi:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Lint OpenAPI Spec
        run: spectral lint docs/contracts/pollek-cloud-dek-api.openapi.yaml --fail-severity=error
