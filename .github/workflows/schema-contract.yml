name: Schema Contract Validation

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docs/contracts/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'docs/contracts/**'

permissions:
  contents: read

jobs:
  validate_schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - name: Install Ajv CLI & Formats
        run: npm install -g ajv-cli ajv-formats

      - name: Validate schemas
        run: |
          for file in docs/contracts/schemas/*.schema.json; do
            echo "Validating schema $file"
            ajv compile -s "$file" -c ajv-formats || exit 1
          done

      - name: Validate sample payloads against schemas
        run: |
          ajv validate -c ajv-formats -s docs/contracts/schemas/telemetry-event.schema.json -d crates/mock-cloud/tests/fixtures/decision_event.json
          ajv validate -c ajv-formats -s docs/contracts/schemas/dek-device.schema.json -d crates/mock-cloud/tests/fixtures/device_register.json

  validate_openapi:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Lint OpenAPI Spec
        run: spectral lint docs/contracts/pollen-cloud-dek-api.openapi.yaml --fail-severity=error
