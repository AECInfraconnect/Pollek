name: Nightly Soak Test

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      soak_secs:
        description: "Soak duration in seconds"
        required: false
        default: "1800"

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run Soak Test
        env:
          SOAK_SECS: ${{ github.event_name == 'workflow_dispatch' && inputs.soak_secs || '1800' }}
        run: cargo test -p acceptance-tests --test soak -- --ignored --nocapture
