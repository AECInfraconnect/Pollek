name: Device Enforcement (Tier-2)

# Manual-only. Runs the privileged eBPF load/attach harness on a Linux runner
# with CAP_BPF. NEVER runs on push/PR, so the default pipeline is unaffected.
# See docs/runbooks/ENFORCE_DEVICE_VERIFICATION.md.
on:
  workflow_dispatch:
    inputs:
      run_real_kernel:
        description: "Opt in to the real kernel load/attach path (needs a privileged runner)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  linux-ebpf-harness:
    name: Linux eBPF load/attach harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Environment probe
        run: |
          echo "kernel: $(uname -r)"
          echo "euid: $(id -u)"
          echo "bpffs: $([ -e /sys/fs/bpf ] && echo present || echo absent)"

      # Tier-1 always runs: pure translation logic, no privilege required.
      - name: Tier-1 translation tests
        run: cargo test -p dek-ebpfd --test device_enforcement

      # Tier-2 real kernel path: opt-in only. GitHub-hosted runners may lack
      # CAP_BPF; the harness SKIPs cleanly with a clear reason if so.
      - name: Tier-2 real kernel load/attach (opt-in)
        if: ${{ inputs.run_real_kernel }}
        run: |
          sudo -E POLLEK_DEVICE_ENFORCE_TEST=1 \
            $(command -v cargo) test -p dek-ebpfd --test device_enforcement -- --ignored --nocapture
