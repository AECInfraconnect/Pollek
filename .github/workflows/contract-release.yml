name: contract-release

on:
  push:
    tags:
      - "contracts-v*"

permissions:
  contents: write
  id-token: write

jobs:
  release-contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - run: npm ci
      - run: npm run test

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp generated/openapi/pollek.v1.yaml dist/
          cp generated/asyncapi/pollek-sse.v1.yaml dist/
          tar -czf dist/schemas.tar.gz -- schemas
          tar -czf dist/catalog.tar.gz -- catalog
          tar -czf dist/pollek-contract-rust.tar.gz -- generated/rust/pollek-contract
          tar -czf dist/pollek-contract-typescript.tgz -- generated/typescript
          cp CHANGELOG.md COMPATIBILITY.md dist/
          cd dist && sha256sum ./* > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Sign checksums with keyless signing
        run: |
          cosign sign-blob --yes --output-signature dist/SHA256SUMS.sig dist/SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: contracts/dist/*
