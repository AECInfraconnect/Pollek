name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      
    - name: Check Formatting
      run: cargo fmt --all -- --check
      
    - name: Clippy
      run: cargo clippy --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii_redactor --exclude dek-opa-wasm --all-targets --all-features -- -D warnings
      
    - name: Run Tests
      run: cargo test --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii_redactor --exclude dek-opa-wasm --all-features
      
    - name: Build Release
      run: cargo build --workspace --exclude dek-ebpf-prog --exclude dek-ebpfd --exclude pii_redactor --exclude dek-opa-wasm --release

  ebpf_build:
    name: eBPF Build (Linux Only)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust nightly for eBPF
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src, llvm-tools-preview
    - name: Install bpf-linker
      run: cargo install bpf-linker
    - name: Build eBPF Prog
      run: cargo build --manifest-path crates/dek-ebpf-prog/Cargo.toml --target bpfel-unknown-none -Z build-std=core
    - name: Build eBPF Daemon
      run: cargo build --manifest-path crates/dek-ebpfd/Cargo.toml --release

  wasm_build:
    name: WASM Plugin Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install wasm32-wasip1 target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-wasip1
    - name: Build WASM Plugins
      run: cargo build --target wasm32-wasip1 -p pii_redactor -p dek-opa-wasm


