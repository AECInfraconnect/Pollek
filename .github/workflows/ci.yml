name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      
    - name: Check Formatting
      run: cargo fmt --all -- --check
      
    - name: Clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      
    - name: Run Tests
      run: cargo test --workspace --all-features
      
    - name: Build Release
      run: cargo build --workspace --release

  ebpf_build:
    name: eBPF Build (Linux Only)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust nightly for eBPF
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src
    - name: Install bpf-linker
      run: cargo install bpf-linker
    - name: Build eBPF
      run: cargo build --manifest-path crates/dek-ebpf-prog/Cargo.toml

  wasm_build:
    name: WASM Plugin Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install wasm32-wasip1 target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-wasip1
    - name: Build WASM Plugins
      run: cargo build --target wasm32-wasip1 --workspace --exclude dek-ebpfd --exclude dek-core
      # In practice, limit this to plugin crates

  security_audit:
    name: Security & Dependencies
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install cargo-audit
      run: cargo install cargo-audit
    - name: Run Cargo Audit
      run: cargo audit
    - name: Install cargo-deny
      run: cargo install cargo-deny
    - name: Run Cargo Deny
      run: cargo deny check
    - name: Install cargo-machete
      run: cargo install cargo-machete
    - name: Run Cargo Machete
      run: cargo machete
