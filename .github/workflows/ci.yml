name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      
    - name: Check Formatting
      run: cargo fmt --all -- --check
      
    - name: Check default workspace
      run: cargo check --workspace --exclude dek-ebpf-prog --exclude pii-redactor-plugin --locked
      
    - name: Clippy default workspace
      run: cargo clippy --workspace --exclude dek-ebpf-prog --exclude pii-redactor-plugin --all-targets --locked -- -D warnings
      
    - name: Test default workspace
      run: cargo test --workspace --exclude dek-ebpf-prog --exclude pii-redactor-plugin --locked
      
    - name: Build release default workspace
      run: cargo build --workspace --exclude dek-ebpf-prog --exclude pii-redactor-plugin --release --locked

  ebpf_build:
    name: eBPF Build (Linux Only)
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust nightly for eBPF
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2024-05-20
        components: rust-src, llvm-tools-preview
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - uses: cargo-bins/cargo-binstall@main
    - name: Install bpf-linker
      run: cargo binstall -y bpf-linker
    - name: Build eBPF Prog
      run: cargo +nightly-2024-05-20 build --manifest-path crates/dek-ebpf-prog/Cargo.toml --target bpfel-unknown-none -Z build-std=core --release
    - name: Build eBPF Daemon
      run: cargo build --manifest-path crates/dek-ebpfd/Cargo.toml --release

  wasm_build:
    name: WASM Plugin Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install wasm32-wasip1 target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-wasip1
    - name: Build WASM Plugins
      run: cargo build --target wasm32-wasip1 -p pii-redactor-plugin


